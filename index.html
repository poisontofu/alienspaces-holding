<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALIEN SPACES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wdth,wght@12..36,150,300..900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      overscroll-behavior: none;
      background: #fff;
      font-family: "TikTok Sans", sans-serif;
      font-variation-settings:
        "slnt" 0,
        "wdth" 150;
    }

    .letter {
      position: absolute;
      top: 0;
      left: 0;
      font-weight: 900;
      font-variation-settings:
        "slnt" 0,
        "wdth" 150;
      color: #999;
      user-select: none;
      cursor: grab;
      transform-origin: center center;
      line-height: 1;
      text-align: center;
      overflow: visible;
    }

    .letter--word-initial {
      color: #000
    }

    .gravity-off .letter.letter--word-initial {
      color: #ff0
    }


    .letter:active {
      cursor: grabbing;
    }


    .object {
      cursor: zoom-in;
    }

    .object.object--enlarged {
      cursor: zoom-out;
    }


    .object:active {
      cursor: grabbing;
    }

    #controls {
      position: fixed;
      top: 16px;
      right: 20px;
      z-index: 10000;
      display: flex;
      gap: 16px;
      align-items: center;
    }

    #controls > button {
      color: #66f;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      border-radius: 4px;
      font-size: 24px;
      user-select: none;
      text-decoration: none;
    }

    @media (max-width: 768px) {
      #controls {
        top: 12px;
        right: 12px;
        gap: 8px;
      }

      #controls > button {
        font-size: 36px;
        padding: 8px;
      }
    }

    #controls > button:hover, #controls > button:hover {
      background: #66f;
      color: #ff0;
    }

    body.gravity-off {
      background: url("stars.gif") repeat;
    }

    body.gravity-off .letter {
      color: #fff;
    }

    body.gravity-off .letter--word-initial {
      color: #fff;
    }
</style>
</head>
<body>
  <div id="controls">
    <button id="scramble">🫨</button>
    <button id="reset">↩️</button>
    <button id="gravity">🌛</button>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
